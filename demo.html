<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Origins World Editor · Atlas UI Demo</title>
  <style>
    :root {
      --paper: #f3ead7;
      --paper-deep: #e6d3ae;
      --ink: #3a2f1f;
      --muted: #8a7a61;
      --gold: #b88a3a;
      --green: #668a5c;
      --river: #376f91;
      --route: #a1733b;
      --glass: rgba(255, 252, 244, 0.72);
      --glass-strong: rgba(255, 250, 235, 0.88);
      --shadow: 0 22px 60px rgba(68, 48, 24, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family:
        "PingFang SC",
        "Microsoft YaHei UI",
        "Noto Sans SC",
        system-ui,
        sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(184, 138, 58, 0.14), transparent 30%),
        radial-gradient(circle at 84% 10%, rgba(75, 116, 128, 0.12), transparent 32%),
        linear-gradient(135deg, #fbf5e7, var(--paper));
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .glass {
      background:
        linear-gradient(180deg, rgba(255, 252, 244, 0.86), rgba(246, 232, 204, 0.56));
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(22px) saturate(1.18);
    }

    .topbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
    }

    .pill,
    .nav-item {
      border: 1px solid rgba(184, 138, 58, 0.16);
      border-radius: 999px;
      padding: 9px 13px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.26);
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
      cursor: default;
      transition: 160ms ease;
    }

    .pill:hover,
    .nav-item:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.42);
    }

    .nav-item.active {
      background: rgba(184, 138, 58, 0.17);
      border-color: rgba(184, 138, 58, 0.42);
      box-shadow: 0 8px 24px rgba(184, 138, 58, 0.16);
      color: #2d2417;
      font-weight: 700;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 130px;
      color: var(--muted);
    }

    .kbd {
      border-radius: 7px;
      padding: 3px 6px;
      background: rgba(58, 47, 31, 0.08);
      color: var(--muted);
      font-size: 11px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #4f7047;
      font-weight: 600;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6fae67;
      box-shadow: 0 0 0 4px rgba(111, 174, 103, 0.16);
    }

    .rail {
      position: fixed;
      left: 24px;
      top: 110px;
      z-index: 10;
      width: 86px;
      padding: 14px 10px;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 22px;
      color: var(--gold);
      background: rgba(184, 138, 58, 0.12);
      border: 1px solid rgba(184, 138, 58, 0.38);
      margin-bottom: 6px;
    }

    .rail-item {
      width: 64px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      gap: 2px;
      color: var(--muted);
      font-size: 12px;
      border: 1px solid transparent;
      transition: 160ms ease;
    }

    .rail-item span:first-child {
      font-size: 20px;
    }

    .rail-item.active {
      color: var(--ink);
      background: rgba(184, 138, 58, 0.14);
      border-color: rgba(184, 138, 58, 0.42);
      box-shadow: 0 8px 24px rgba(184, 138, 58, 0.14);
    }

    .rail-item:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.34);
    }

    .bottom-panel {
      position: fixed;
      z-index: 10;
      left: 126px;
      right: 26px;
      bottom: 22px;
      display: grid;
      grid-template-columns: minmax(360px, 1.3fr) minmax(230px, 0.75fr) minmax(330px, 1fr);
      gap: 14px;
    }

    .card {
      min-height: 146px;
      border-radius: 26px;
      padding: 18px;
    }

    .eyebrow {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }

    .tags {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(184, 138, 58, 0.14);
      color: #76551f;
      font-size: 12px;
      border: 1px solid rgba(184, 138, 58, 0.2);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .meta-grid strong {
      color: var(--ink);
      font-weight: 700;
      margin-left: 6px;
    }

    .object-card {
      display: grid;
      grid-template-columns: 1fr 104px;
      gap: 16px;
      align-items: center;
    }

    .thumb {
      height: 100px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: var(--gold);
      font-size: 38px;
      background:
        radial-gradient(circle at 50% 20%, rgba(184, 138, 58, 0.18), transparent 48%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.42), rgba(230, 211, 174, 0.32));
      border: 1px solid rgba(184, 138, 58, 0.24);
    }

    .action-title {
      font-weight: 800;
      margin-bottom: 14px;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .action {
      height: 76px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.28);
      border: 1px solid rgba(184, 138, 58, 0.16);
      color: var(--ink);
      font-size: 13px;
      transition: 160ms ease;
    }

    .action strong {
      font-size: 22px;
      line-height: 1;
    }

    .action:hover {
      transform: translateY(-2px);
      background: rgba(184, 138, 58, 0.12);
      border-color: rgba(184, 138, 58, 0.34);
    }

    .toggle-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .toggle {
      border-radius: 16px;
      padding: 12px 8px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.38);
    }

    .toggle.on {
      color: #5d451b;
      background: rgba(184, 138, 58, 0.14);
      border-color: rgba(184, 138, 58, 0.32);
    }

    .brand {
      position: fixed;
      right: 28px;
      top: 92px;
      z-index: 9;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 1120px) {
      .topbar {
        max-width: calc(100vw - 36px);
        overflow-x: auto;
      }

      .bottom-panel {
        left: 104px;
        grid-template-columns: 1fr;
        max-height: 42vh;
        overflow-y: auto;
      }

      .rail {
        width: 72px;
      }
    }
  </style>
</head>
<body>
  <canvas id="map"></canvas>

  <div class="topbar glass">
    <div class="pill">撤销</div>
    <div class="pill">重做</div>
    <div class="pill search">🔎 搜索 <span class="kbd">Ctrl K</span></div>
    <div class="nav-item">会话</div>
    <div class="nav-item active">世界</div>
    <div class="nav-item">人物</div>
    <div class="nav-item">事件</div>
    <div class="nav-item">关系</div>
    <div class="nav-item">时间</div>
    <div class="nav-item">更多</div>
    <div class="pill status">已保存</div>
    <div class="pill">文件</div>
    <div class="pill">设置</div>
  </div>

  <aside class="rail glass">
    <div class="logo">✦</div>
    <div class="rail-item active"><span>🌍</span><span>世界</span></div>
    <div class="rail-item"><span>📍</span><span>地点</span></div>
    <div class="rail-item"><span>⚑</span><span>势力</span></div>
    <div class="rail-item"><span>👤</span><span>人物</span></div>
    <div class="rail-item"><span>✹</span><span>事件</span></div>
    <div class="rail-item"><span>⌛</span><span>时间线</span></div>
    <div class="rail-item"><span>▦</span><span>图层</span></div>
  </aside>

  <div class="brand glass">Origins World Editor · Atlas UI Concept</div>

  <section class="bottom-panel">
    <div class="card glass object-card">
      <div>
        <div class="eyebrow">当前对象</div>
        <div class="title">不朽堡垒</div>
        <div class="tags">
          <span class="tag">堡垒</span>
          <span class="tag">重要据点</span>
          <span class="tag">黑森林边缘</span>
        </div>
        <div class="meta-grid">
          <div>地理位置 <strong>黑森林边缘</strong></div>
          <div>坐标 <strong>-150, -100</strong></div>
          <div>势力归属 <strong>无</strong></div>
          <div>重要程度 <strong>高</strong></div>
        </div>
      </div>
      <div class="thumb">♜</div>
    </div>

    <div class="card glass">
      <div class="action-title">上下文操作</div>
      <div class="action-grid">
        <div class="action"><strong>＋</strong><span>添加地点</span></div>
        <div class="action"><strong>↔</strong><span>建立关系</span></div>
        <div class="action"><strong>✦</strong><span>标记事件</span></div>
      </div>
    </div>

    <div class="card glass">
      <div class="action-title">次级操作</div>
      <div class="toggle-grid">
        <div class="toggle on">显示网格</div>
        <div class="toggle on">显示名称</div>
        <div class="toggle on">辅助线</div>
        <div class="toggle">隐藏关系</div>
        <div class="toggle on">显示全部</div>
        <div class="toggle">导出分享</div>
      </div>
    </div>
  </section>

  <script>
    const canvas = document.getElementById("map");
    const ctx = canvas.getContext("2d");

    function resize() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      draw();
    }

    window.addEventListener("resize", resize);

    function drawPaper() {
      const w = innerWidth;
      const h = innerHeight;

      const grad = ctx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0, "#fbf3df");
      grad.addColorStop(1, "#e7d4af");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      ctx.globalAlpha = 0.26;
      ctx.strokeStyle = "rgba(86, 65, 34, 0.12)";
      for (let x = -200; x < w + 200; x += 180) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x + 80, h);
        ctx.stroke();
      }
      for (let y = 0; y < h; y += 160) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y - 50);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      for (let i = 0; i < 3200; i++) {
        ctx.fillStyle = Math.random() > 0.5
          ? "rgba(70, 44, 18, 0.025)"
          : "rgba(255,255,255,0.035)";
        ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
      }

      const vignette = ctx.createRadialGradient(w / 2, h / 2, 120, w / 2, h / 2, Math.max(w, h) * 0.7);
      vignette.addColorStop(0, "rgba(255,255,255,0)");
      vignette.addColorStop(1, "rgba(121,82,31,0.12)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, w, h);
    }

    function smoothPath(points, closed = false) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length - 1; i++) {
        const midX = (points[i].x + points[i + 1].x) / 2;
        const midY = (points[i].y + points[i + 1].y) / 2;
        ctx.quadraticCurveTo(points[i].x, points[i].y, midX, midY);
      }
      const last = points[points.length - 1];
      ctx.lineTo(last.x, last.y);
      if (closed) ctx.closePath();
    }

    function drawContinent() {
      const cx = innerWidth / 2;
      const cy = innerHeight / 2 - 30;
      const pts = [
        { x: cx - 340, y: cy - 190 },
        { x: cx - 120, y: cy - 250 },
        { x: cx + 160, y: cy - 220 },
        { x: cx + 330, y: cy - 80 },
        { x: cx + 270, y: cy + 160 },
        { x: cx + 60, y: cy + 240 },
        { x: cx - 220, y: cy + 190 },
        { x: cx - 360, y: cy + 20 }
      ];

      ctx.save();
      ctx.shadowColor = "rgba(62, 42, 20, 0.22)";
      ctx.shadowBlur = 28;
      ctx.shadowOffsetY = 12;
      smoothPath(pts, true);
      ctx.fillStyle = "#dec79f";
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.lineWidth = 9;
      ctx.strokeStyle = "rgba(255,255,255,0.22)";
      ctx.stroke();

      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(105,75,35,0.44)";
      ctx.stroke();

      ctx.lineWidth = 1.2;
      ctx.strokeStyle = "rgba(255,255,255,0.52)";
      ctx.stroke();

      ctx.restore();

      ctx.save();
      ctx.fillStyle = "rgba(98, 74, 34, 0.18)";
      for (let i = 0; i < 18; i++) {
        const x = cx - 60 + Math.cos(i) * 180 + (i % 3) * 18;
        const y = cy - 50 + Math.sin(i * 1.7) * 120;
        drawMountain(x, y, 18 + (i % 4) * 4);
      }
      ctx.restore();

      ctx.save();
      ctx.textAlign = "center";
      ctx.font = "700 36px serif";
      ctx.fillStyle = "rgba(93,65,28,0.82)";
      ctx.shadowColor = "rgba(255,255,255,0.66)";
      ctx.shadowBlur = 6;
      ctx.fillText("瓦罗兰大陆", cx + 20, cy + 18);

      ctx.strokeStyle = "rgba(184,138,58,0.52)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx - 70, cy + 36);
      ctx.quadraticCurveTo(cx + 20, cy + 52, cx + 110, cy + 36);
      ctx.stroke();
      ctx.restore();

      return { cx, cy };
    }

    function drawMountain(x, y, s) {
      ctx.beginPath();
      ctx.moveTo(x - s, y + s);
      ctx.lineTo(x, y - s);
      ctx.lineTo(x + s, y + s);
      ctx.strokeStyle = "rgba(93, 72, 45, 0.28)";
      ctx.lineWidth = 1.4;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x - s * 0.25, y - s * 0.35);
      ctx.lineTo(x, y - s);
      ctx.lineTo(x + s * 0.25, y - s * 0.35);
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.stroke();
    }

    function drawForest(cx, cy) {
      const pts = [
        { x: cx - 260, y: cy - 160 },
        { x: cx - 90, y: cy - 180 },
        { x: cx - 40, y: cy - 80 },
        { x: cx - 210, y: cy - 40 },
        { x: cx - 300, y: cy - 80 }
      ];

      ctx.save();
      smoothPath(pts, true);
      ctx.fillStyle = "rgba(92, 135, 86, 0.54)";
      ctx.fill();

      ctx.lineWidth = 8;
      ctx.strokeStyle = "rgba(255,255,255,0.16)";
      ctx.stroke();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(61, 96, 59, 0.3)";
      ctx.stroke();

      for (let i = 0; i < 42; i++) {
        const x = cx - 270 + ((i * 47) % 220);
        const y = cy - 165 + ((i * 31) % 125);
        drawTree(x, y, 7);
      }

      ctx.textAlign = "center";
      ctx.font = "700 24px serif";
      ctx.fillStyle = "rgba(255,255,245,0.9)";
      ctx.shadowColor = "rgba(35,70,36,0.55)";
      ctx.shadowBlur = 8;
      ctx.fillText("黑森林", cx - 170, cy - 98);
      ctx.restore();
    }

    function drawTree(x, y, s) {
      ctx.fillStyle = "rgba(31, 75, 42, 0.38)";
      ctx.beginPath();
      ctx.moveTo(x, y - s);
      ctx.lineTo(x - s * 0.7, y + s * 0.5);
      ctx.lineTo(x + s * 0.7, y + s * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.fillRect(x - 1, y + s * 0.4, 2, s * 0.7);
    }

    function drawRiver(cx, cy) {
      const pts = [
        { x: cx - 90, y: cy - 170 },
        { x: cx - 30, y: cy - 130 },
        { x: cx + 40, y: cy - 150 },
        { x: cx + 120, y: cy - 80 },
        { x: cx + 220, y: cy - 40 }
      ];

      ctx.save();
      smoothPath(pts);
      ctx.lineWidth = 11;
      ctx.strokeStyle = "rgba(74, 132, 160, 0.18)";
      ctx.lineCap = "round";
      ctx.stroke();

      smoothPath(pts);
      ctx.lineWidth = 4;
      ctx.strokeStyle = "#376f91";
      ctx.stroke();

      smoothPath(pts);
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = "rgba(255,255,255,0.5)";
      ctx.stroke();

      ctx.font = "600 15px serif";
      ctx.fillStyle = "rgba(38, 84, 111, 0.86)";
      ctx.fillText("静谧河", cx + 70, cy - 116);
      ctx.restore();
    }

    function drawRoad(cx, cy) {
      const a = { x: cx - 190, y: cy - 70 };
      const b = { x: cx - 285, y: cy + 145 };

      ctx.save();
      ctx.setLineDash([7, 7]);
      ctx.lineWidth = 2.2;
      ctx.strokeStyle = "rgba(130, 88, 36, 0.72)";
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.quadraticCurveTo(cx - 270, cy + 30, b.x, b.y);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.font = "600 13px serif";
      ctx.fillStyle = "rgba(112,75,32,0.78)";
      ctx.fillText("古商路", cx - 270, cy + 34);
      ctx.restore();
    }

    function drawNode(x, y, name, selected = false) {
      const w = 74;
      const h = 78;

      ctx.save();
      ctx.translate(x, y);

      if (selected) {
        ctx.shadowColor = "rgba(184,138,58,0.38)";
        ctx.shadowBlur = 18;
      } else {
        ctx.shadowColor = "rgba(60,40,20,0.18)";
        ctx.shadowBlur = 12;
      }

      roundRect(ctx, -w / 2, -h / 2, w, h, 16);
      ctx.fillStyle = "rgba(255, 250, 235, 0.94)";
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.lineWidth = selected ? 2.2 : 1.2;
      ctx.strokeStyle = selected
        ? "rgba(184,138,58,0.85)"
        : "rgba(176,132,58,0.36)";
      ctx.stroke();

      ctx.fillStyle = selected ? "#9a6c23" : "#7d6b52";
      ctx.font = "30px serif";
      ctx.textAlign = "center";
      ctx.fillText("♜", 0, 10);

      if (selected) {
        ctx.fillStyle = "#d39b36";
        ctx.beginPath();
        ctx.arc(w / 2 - 9, -h / 2 + 9, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.font = "700 14px sans-serif";
      ctx.fillStyle = "#3a2f1f";
      ctx.shadowColor = "rgba(255,255,255,0.8)";
      ctx.shadowBlur = 5;
      ctx.fillText(name, 0, h / 2 + 22);

      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawCompass() {
      const x = innerWidth - 110;
      const y = innerHeight - 230;
      ctx.save();
      ctx.translate(x, y);
      ctx.strokeStyle = "rgba(74, 52, 23, 0.22)";
      ctx.fillStyle = "rgba(74, 52, 23, 0.32)";
      ctx.lineWidth = 1.4;

      for (let i = 0; i < 8; i++) {
        ctx.rotate(Math.PI / 4);
        ctx.beginPath();
        ctx.moveTo(0, -44);
        ctx.lineTo(6, -12);
        ctx.lineTo(0, -18);
        ctx.lineTo(-6, -12);
        ctx.closePath();
        ctx.stroke();
      }

      ctx.font = "700 16px serif";
      ctx.textAlign = "center";
      ctx.fillText("N", 0, -58);
      ctx.restore();
    }

    function draw() {
      drawPaper();
      const { cx, cy } = drawContinent();
      drawForest(cx, cy);
      drawRiver(cx, cy);
      drawRoad(cx, cy);
      drawNode(cx - 190, cy - 70, "不朽堡垒", true);
      drawNode(cx - 285, cy + 145, "比尔吉沃特", false);
      drawCompass();
    }

    resize();
  </script>
